<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <style>
        body{
            background: center/cover no-repeat url("interface.png");
            height: 100vh;
            width: 100vw;
        }
        .account{
            background-color: rgb(255, 145, 0);
            color: white;
            border-radius: 15px;
            display:inline-block;
        
        }
        .accounti{
            background-color: rgb(255, 145, 0);
            border-radius: 10px;
            display:inline-block;
           font-size: 20px;
           color: black;
           /* margin:210px; */
           /* border:2px solid black; */
        }
        .accounti:hover{
            /* color:white; */
            border: 2px solid black;
        }
        .a{
            padding:8px;
         }
         a:hover{
             text-decoration: none;
             color:black;
         }
         .first{
             display: flex;
             justify-content: space-between;
         }
         .second{
             display: flex;
             justify-content: center;
             align-items: center;
         }
         .firstcontainer{
             color: black;
             font-size: 20px;
             font-weight: bolder;
             margin:3px;
         }
         .content{
           display: flex;
           flex-direction: column;
           justify-content: center;
           align-items: center;
           text-align: center;
           font-size: 30px;
           color:black;
           font-weight: bolder;
           margin-top: 150px;
         }
         #a{
           margin-top: 10px;
         }
    </style>
</head>
<body>
    
<div>
    <div class="first">
        <div class="firstcontainer">
            ARDOR
        </div>
        <div class="secondcontainer">
            <a id="a" class="account a" href="home.html">Project Feed</a>
            <a id="userlink"class="nav-link" href="#"></a>
            <a id="signoutlink"class="nav-link" href="#">Sign Out</a>
        </div>
    </div> 
    <div class="content">
      <p>LEARN</p>
      <p>BUILD</p>
      <p>COLLABORATE</p>
    </div>
    <div class="second"> 
        <a id="hh" class="accounti" href="form.html"></a>
    </div> 
</div>
</body>
      <script>
        let userlink=document.getElementById('userlink');
        let signoutlink=document.getElementById('signoutlink');
        let header=document.getElementById('hh');
        var currentUser=null;
        function getUsername(){
          let keepLoggedIn =  localStorage.getItem("keepLoggedIn");
          if(keepLoggedIn=="yes"){
            currentUser=JSON.parse(localStorage.getItem('user'));

          }
          else{
            currentUser=JSON.parse(sessionStorage.getItem('user'))
          }
        }
        function Signout(){
          sessionStorage.removeItem('user');
          localStorage.removeItem('user');
          localStorage.removeItem('keepLoggedIn');
          window.location="index.html";
        }
        window.onload=function(){
          getUsername();
          if(currentUser==null){
            userlink.innerText="Create New Account";
            userlink.classList.replace("nav-link","btn");
            userlink.classList.add("account");
            userlink.href="register.html";
            signoutlink.innerText="Login";
            signoutlink.classList.replace("nav-link","btn");
            signoutlink.classList.add("account");
            signoutlink.href="login.html";
          }
          else{
            userlink.innerText=currentUser.fullname;
            header.innerText="Upload Your Project";
            // header.classList.add("account a")
            userlink.classList.replace("btn","nav-link");
            userlink.classList.add("account");
            userlink.href="#";
            signoutlink.innerText="Sign Out";
            signoutlink.classList.replace("btn","nav-link");
            signoutlink.classList.add("account");
            signoutlink.href="javascript:Signout()";
          }
        }
      </script>
</body>
</html>
